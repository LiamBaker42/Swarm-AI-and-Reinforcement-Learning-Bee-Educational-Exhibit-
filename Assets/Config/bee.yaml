behaviors:
  BeeLearner:
    trainer_type: ppo
    keep_checkpoints: 5
    max_steps: 10000000      
    time_horizon: 256         # Increased for longer sequences
    summary_freq: 10000
    hyperparameters:
      batch_size: 2048        # Much larger for smoother gradient updates
      buffer_size: 20480      # 10x batch_size for better experience variety
      learning_rate: 3.0e-4
      beta: 5.0e-3            # Standard exploration strength
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true         # Keeps observations in a healthy math range
      hidden_units: 256       # Larger brain for complex navigation
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99           # Focuses on long-term rewards (reaching flower)
        strength: 1.0